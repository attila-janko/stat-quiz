<!doctype html>
<html lang="hu"> <!teszt>
<head>
  <meta charset="utf-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1"> 
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Statisztika igaz-hamis kvíz</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5c6672;
      --line: #d8dee6;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --soft: #eef3f7;
      --blue: #235789;
      --teal: #14746f;
      --green: #238636;
      --red: #b42318;
      --amber: #b7791f;
      --shadow: 0 18px 50px rgba(23, 32, 42, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(35, 87, 137, 0.09), transparent 34%),
        linear-gradient(315deg, rgba(20, 116, 111, 0.1), transparent 30%),
        var(--paper);
      color: var(--ink);
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
    }

    .sidebar {
      min-height: 100vh;
      padding: 28px;
      background: #17202a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mark {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: end;
      gap: 4px;
      padding: 9px;
      background: rgba(255, 255, 255, 0.08);
    }

    .mark span {
      display: block;
      border-radius: 3px 3px 0 0;
      background: #f4d35e;
    }

    .mark span:nth-child(1) { height: 42%; }
    .mark span:nth-child(2) { height: 72%; background: #4ecdc4; }
    .mark span:nth-child(3) { height: 55%; background: #f95738; }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .scorebox {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.07);
    }

    .metric strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 0.82rem;
    }

    .topic-section {
      display: grid;
      gap: 10px;
    }

    .topic-title {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .topic-list {
      display: grid;
      gap: 8px;
    }

    .topic-button {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: transparent;
      color: #f8fafc;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      cursor: pointer;
      text-align: left;
    }

    .topic-button:hover,
    .topic-button.active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .topic-button span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topic-score {
      color: #cbd5e1;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 8px;
      margin-top: auto;
      max-height: min(38vh, 280px);
      overflow: auto;
      padding-right: 4px;
    }

    .question-jump {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: transparent;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .question-jump:hover,
    .question-jump.active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
      flex: 0 0 auto;
    }

    .status-dot.correct { background: #5ee38b; }
    .status-dot.wrong { background: #ff7a66; }

    main {
      padding: 36px;
      display: grid;
      align-items: center;
    }

    .quiz-shell {
      width: min(920px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #f8fafc;
    }

    .progress-wrap {
      min-width: 180px;
      flex: 1 1 auto;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      background: #dfe6ee;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      transition: width 220ms ease;
    }

    .reset {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
    }

    .reset:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .quiz-body {
      padding: 34px;
    }

    .kicker {
      color: var(--blue);
      font-weight: 750;
      font-size: 0.9rem;
      margin: 0 0 12px;
    }

    .question {
      margin: 0;
      font-size: clamp(1.35rem, 2.2vw, 2rem);
      line-height: 1.32;
      letter-spacing: 0;
    }

    .options {
      margin: 30px 0 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .option {
      position: relative;
      min-height: 76px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 18px 18px 18px 54px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .option:hover {
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .option::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #9aa6b2;
      transform: translateY(-50%);
      background: #ffffff;
    }

    .option.selected {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .option.selected::before {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 5px #ffffff;
      background: var(--blue);
    }

    .option.correct {
      border-color: var(--green);
      background: #effdf3;
    }

    .option.wrong {
      border-color: var(--red);
      background: #fff1ee;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary,
    .secondary {
      min-height: 46px;
      border-radius: 8px;
      padding: 0 18px;
      cursor: pointer;
      border: 1px solid transparent;
      font-weight: 700;
    }

    .primary {
      background: var(--blue);
      color: #ffffff;
    }

    .primary:disabled {
      background: #b6c2cf;
      cursor: not-allowed;
    }

    .secondary {
      background: #ffffff;
      border-color: var(--line);
      color: var(--ink);
    }

    .secondary:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    .feedback {
      display: none;
      margin-top: 30px;
      border-left: 5px solid var(--amber);
      background: #fff8e8;
      padding: 22px;
      border-radius: 0 8px 8px 0;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      border-left-color: var(--green);
      background: #effdf3;
    }

    .feedback.wrong {
      border-left-color: var(--red);
      background: #fff1ee;
    }

    .feedback h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .feedback p {
      margin: 0 0 10px;
      color: #27313b;
      line-height: 1.62;
    }

    .feedback p:last-child {
      margin-bottom: 0;
    }

    .free-answer {
      width: 100%;
      min-height: 120px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      resize: vertical;
      color: var(--ink);
      background: #ffffff;
      line-height: 1.5;
      font: inherit;
    }

    .self-grade {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .self-grade button {
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 0 14px;
      background: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    .self-grade button:first-child {
      border-color: var(--green);
      color: var(--green);
    }

    .self-grade button:last-child {
      border-color: var(--red);
      color: var(--red);
    }

    .complete {
      display: none;
      padding: 34px;
      border-top: 1px solid var(--line);
      background: #f8fafc;
    }

    .complete.show {
      display: block;
    }

    .complete h2 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    .complete p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      .app {
        display: block;
      }

      .sidebar {
        min-height: auto;
        padding: 20px;
      }

      .question-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        max-height: none;
        margin-top: 0;
      }

      main {
        padding: 18px;
      }

      .quiz-body,
      .complete {
        padding: 24px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .options {
        grid-template-columns: 1fr;
      }

      .question-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .question {
        font-size: 1.28rem;
      }

      .actions {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Kvíz állapota">
      <div>
        <div class="brand">
          <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
          <div>
            <h1>Statisztika kvíz</h1>
            <p class="subtitle">Témakörös gyakorlás az órai anyagból.</p>
          </div>
        </div>
      </div>

      <div class="scorebox" aria-live="polite">
        <div class="metric">
          <strong id="score">0</strong>
          <span>helyes</span>
        </div>
        <div class="metric">
          <strong id="answered">0/0</strong>
          <span>megoldva</span>
        </div>
        <div class="metric">
          <strong id="topicPercent">0%</strong>
          <span>témakör</span>
        </div>
        <div class="metric">
          <strong id="topicAnswered">0/0</strong>
          <span>témán belül</span>
        </div>
      </div>

      <section class="topic-section" aria-label="Témakörök">
        <p class="topic-title">Témakörök</p>
        <div class="topic-list" id="topicList"></div>
      </section>

      <nav class="question-list" id="questionList" aria-label="Kérdések"></nav>
    </aside>

    <main>
      <section class="quiz-shell" aria-live="polite">
        <div class="topbar">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="progressLabel">1 / 9</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
          </div>
          <button class="reset" type="button" id="resetButton">Újrakezdés</button>
        </div>

        <div class="quiz-body">
          <p class="kicker" id="questionNumber"></p>
          <p class="question" id="questionText"></p>
          <div class="options" id="options"></div>
          <div class="actions">
            <button class="primary" type="button" id="submitButton" disabled>Válasz beküldése</button>
            <button class="secondary" type="button" id="nextButton">Következő</button>
          </div>
          <article class="feedback" id="feedback"></article>
        </div>

        <div class="complete" id="completeBox"></div>
      </section>
    </main>
  </div>

  <script>
    if ("caches" in window) {
      caches.keys().then(keys => keys.forEach(key => caches.delete(key)));
    }

    document.write(`<script src="questions.js?v=${Date.now()}"><\/script>`);
  </script>
  <script>
    const quiz = window.quizQuestions || [];
    const TRACKING_ENDPOINT = "https://stat-quiz-api.atti199.workers.dev";
    const ALL_TOPICS = "Összes";
    const topics = [ALL_TOPICS, ...(window.quizTopics || [...new Set(quiz.map(item => item.topic || "Egyéb"))])];

    const state = {
      current: 0,
      topic: ALL_TOPICS,
      selected: null,
      answers: Array(quiz.length).fill(null)
    };

    const els = {
      score: document.getElementById("score"),
      answered: document.getElementById("answered"),
      topicPercent: document.getElementById("topicPercent"),
      topicAnswered: document.getElementById("topicAnswered"),
      topicList: document.getElementById("topicList"),
      questionList: document.getElementById("questionList"),
      progressLabel: document.getElementById("progressLabel"),
      progressPercent: document.getElementById("progressPercent"),
      progressBar: document.getElementById("progressBar"),
      questionNumber: document.getElementById("questionNumber"),
      questionText: document.getElementById("questionText"),
      options: document.getElementById("options"),
      submit: document.getElementById("submitButton"),
      next: document.getElementById("nextButton"),
      reset: document.getElementById("resetButton"),
      feedback: document.getElementById("feedback"),
      complete: document.getElementById("completeBox")
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hasOptions(item) {
      return Array.isArray(item.options) && item.options.length > 0;
    }

    function trackEvent(event, details = {}) {
      if (!TRACKING_ENDPOINT) return;

      const payload = JSON.stringify({
        event,
        path: location.pathname,
        topic: state.topic,
        questionTitle: quiz[state.current]?.title || null,
        ...details
      });

      const beacon = new Image();
      beacon.src = `${TRACKING_ENDPOINT}/ping?d=${encodeURIComponent(payload)}&t=${Date.now()}`;
    }

    function shuffleOptions(options) {
      const shuffled = [...options];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
      }

      return shuffled;
    }

    quiz.forEach(item => {
      if (hasOptions(item)) {
        item.shuffledOptions = shuffleOptions(item.options);
      }
    });

    function getQuestionTopic(item) {
      return item.topic || "Egyéb";
    }

    function getVisibleIndexes() {
      return quiz
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => state.topic === ALL_TOPICS || getQuestionTopic(item) === state.topic)
        .map(({ index }) => index);
    }

    function getTopicStats(topic) {
      const indexes = quiz
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => topic === ALL_TOPICS || getQuestionTopic(item) === topic)
        .map(({ index }) => index);
      const answered = indexes.filter(index => state.answers[index] && state.answers[index].correct !== null).length;
      const correct = indexes.filter(index => state.answers[index]?.correct).length;
      const percent = answered ? Math.round((correct / answered) * 100) : 0;

      return { indexes, answered, correct, percent, total: indexes.length };
    }

    function setTopic(topic) {
      state.topic = topic;
      const visibleIndexes = getVisibleIndexes();
      state.current = visibleIndexes.includes(state.current) ? state.current : visibleIndexes[0];
      state.selected = state.answers[state.current]?.choice || null;
      trackEvent("topic_change", { topic });
      render();
    }

    function getVisiblePosition() {
      const visibleIndexes = getVisibleIndexes();
      return Math.max(0, visibleIndexes.indexOf(state.current));
    }

    function renderTopicList() {
      els.topicList.innerHTML = "";

      topics.forEach(topic => {
        const stats = getTopicStats(topic);
        const button = document.createElement("button");
        button.className = `topic-button${topic === state.topic ? " active" : ""}`;
        button.type = "button";
        button.innerHTML = `<span>${escapeHtml(topic)}</span><span class="topic-score">${stats.answered}/${stats.total} · ${stats.percent}%</span>`;
        button.addEventListener("click", () => setTopic(topic));
        els.topicList.appendChild(button);
      });
    }

    function renderJumpList() {
      els.questionList.innerHTML = "";

      getVisibleIndexes().forEach((index, visibleIndex) => {
        const item = quiz[index];
        const button = document.createElement("button");
        const status = state.answers[index];
        button.className = `question-jump${index === state.current ? " active" : ""}`;
        button.type = "button";
        const statusClass = status && status.correct !== null ? (status.correct ? "correct" : "wrong") : "";
        button.innerHTML = `<span>${visibleIndex + 1}. kérdés</span><span class="status-dot ${statusClass}"></span>`;
        button.addEventListener("click", () => {
          state.current = index;
          state.selected = state.answers[index]?.choice || null;
          render();
        });
        els.questionList.appendChild(button);
      });
    }

    function renderQuestion() {
      const item = quiz[state.current];
      const saved = state.answers[state.current];
      const isChoiceQuestion = hasOptions(item);
      const visiblePosition = getVisiblePosition();
      const visibleTotal = getVisibleIndexes().length;

      els.questionNumber.textContent = `${visiblePosition + 1}. kérdés / ${visibleTotal} · ${getQuestionTopic(item)} · ${item.source || "Kérdésbank"}${item.title ? ` · ${item.title}` : ""}`;
      els.questionText.textContent = item.question;
      els.options.innerHTML = "";

      if (!isChoiceQuestion) {
        const textarea = document.createElement("textarea");
        textarea.className = "free-answer";
        textarea.placeholder = "Ide írhatod a saját válaszod, aztán ellenőrizheted a megoldással.";
        textarea.value = saved?.choice || state.selected || "";
        textarea.disabled = Boolean(saved);
        textarea.addEventListener("input", () => {
          state.selected = textarea.value;
        });
        els.options.appendChild(textarea);
      }

      if (isChoiceQuestion) item.shuffledOptions.forEach(option => {
        const button = document.createElement("button");
        const isSelected = (saved?.choice || state.selected) === option;
        const isCorrect = saved && saved.correct !== null && option === item.answer;
        const isWrong = saved && saved.correct !== null && saved.choice === option && option !== item.answer;
        button.className = [
          "option",
          isSelected ? "selected" : "",
          isCorrect ? "correct" : "",
          isWrong ? "wrong" : ""
        ].filter(Boolean).join(" ");
        button.type = "button";
        button.textContent = option;
        button.disabled = Boolean(saved);
        button.addEventListener("click", () => {
          state.selected = option;
          renderQuestion();
        });
        els.options.appendChild(button);
      });

      els.submit.textContent = isChoiceQuestion ? "Válasz beküldése" : "Válasz megmutatása";
      els.submit.disabled = isChoiceQuestion ? (!state.selected || Boolean(saved)) : Boolean(saved);
      els.next.textContent = visiblePosition === visibleTotal - 1 ? "Témakör vége" : "Következő";
      renderFeedback();
    }

    function renderFeedback() {
      const item = quiz[state.current];
      const saved = state.answers[state.current];

      if (!saved) {
        els.feedback.className = "feedback";
        els.feedback.innerHTML = "";
        return;
      }

      const graded = saved.correct !== null;
      els.feedback.className = `feedback show ${!graded ? "" : (saved.correct ? "correct" : "wrong")}`;
      const title = !graded
        ? `Helyes válasz: ${item.answer}`
        : saved.correct
          ? `Helyes: ${item.answer}`
          : `Nem pontos. A helyes válasz: ${item.answer}`;
      els.feedback.innerHTML = [
        `<h2>${escapeHtml(title)}</h2>`,
        ...item.explanation.map(text => `<p>${escapeHtml(text)}</p>`),
        !graded ? `<div class="self-grade"><button type="button" data-self-grade="true">Tudtam</button><button type="button" data-self-grade="false">Nem tudtam</button></div>` : ""
      ].join("");

      els.feedback.querySelectorAll("[data-self-grade]").forEach(button => {
        button.addEventListener("click", () => {
          const correct = button.dataset.selfGrade === "true";
          state.answers[state.current] = {
            ...state.answers[state.current],
            correct
          };
          trackEvent("answer", {
            correct,
            questionTitle: item.title,
            topic: getQuestionTopic(item)
          });
          render();
        });
      });
    }

    function renderStats() {
      const overallAnswered = state.answers.filter(answer => answer && answer.correct !== null).length;
      const correct = state.answers.filter(answer => answer?.correct).length;
      const topicStats = getTopicStats(state.topic);
      const topicCompletion = topicStats.total ? Math.round((topicStats.answered / topicStats.total) * 100) : 0;
      const visiblePosition = getVisiblePosition();

      els.score.textContent = String(correct);
      els.answered.textContent = `${overallAnswered}/${quiz.length}`;
      els.topicPercent.textContent = `${topicStats.percent}%`;
      els.topicAnswered.textContent = `${topicStats.answered}/${topicStats.total}`;
      els.progressLabel.textContent = `${visiblePosition + 1} / ${topicStats.total}`;
      els.progressPercent.textContent = `${topicCompletion}% kész`;
      els.progressBar.style.width = `${topicCompletion}%`;

      if (topicStats.answered === topicStats.total) {
        els.complete.className = "complete show";
        els.complete.innerHTML = `<h2>${escapeHtml(state.topic)}: ${topicStats.correct}/${topicStats.total} (${topicStats.percent}%)</h2><p>A témakör végére értél. Az oldalsó kérdésekre kattintva bármelyik magyarázatot újra meg tudod nézni.</p>`;
      } else {
        els.complete.className = "complete";
        els.complete.innerHTML = "";
      }
    }

    function render() {
      renderStats();
      renderTopicList();
      renderJumpList();
      renderQuestion();
    }

    els.submit.addEventListener("click", () => {
      const item = quiz[state.current];
      const isChoiceQuestion = hasOptions(item);
      if (isChoiceQuestion && !state.selected) return;

      state.answers[state.current] = {
        choice: state.selected || "",
        correct: isChoiceQuestion ? state.selected === item.answer : null
      };
      trackEvent("answer", {
        correct: state.answers[state.current].correct,
        questionTitle: item.title,
        topic: getQuestionTopic(item)
      });
      render();
    });

    els.next.addEventListener("click", () => {
      const visibleIndexes = getVisibleIndexes();
      const visiblePosition = visibleIndexes.indexOf(state.current);
      const nextPosition = Math.min(visiblePosition + 1, visibleIndexes.length - 1);
      state.current = visibleIndexes[nextPosition];
      state.selected = state.answers[state.current]?.choice || null;
      render();
    });

    els.reset.addEventListener("click", () => {
      state.current = 0;
      state.topic = ALL_TOPICS;
      state.selected = null;
      state.answers = Array(quiz.length).fill(null);
      render();
    });

    render();
    trackEvent("page_view");
  </script>
</body>
</html>
