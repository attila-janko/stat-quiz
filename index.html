<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Statisztika igaz-hamis kvíz</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5c6672;
      --line: #d8dee6;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --soft: #eef3f7;
      --blue: #235789;
      --teal: #14746f;
      --green: #238636;
      --red: #b42318;
      --amber: #b7791f;
      --shadow: 0 18px 50px rgba(23, 32, 42, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(35, 87, 137, 0.09), transparent 34%),
        linear-gradient(315deg, rgba(20, 116, 111, 0.1), transparent 30%),
        var(--paper);
      color: var(--ink);
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
    }

    .sidebar {
      min-height: 100vh;
      padding: 28px;
      background: #17202a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mark {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: end;
      gap: 4px;
      padding: 9px;
      background: rgba(255, 255, 255, 0.08);
    }

    .mark span {
      display: block;
      border-radius: 3px 3px 0 0;
      background: #f4d35e;
    }

    .mark span:nth-child(1) { height: 42%; }
    .mark span:nth-child(2) { height: 72%; background: #4ecdc4; }
    .mark span:nth-child(3) { height: 55%; background: #f95738; }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .scorebox {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.07);
    }

    .metric strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 0.82rem;
    }

    .question-list {
      display: grid;
      gap: 8px;
      margin-top: auto;
    }

    .question-jump {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: transparent;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .question-jump:hover,
    .question-jump.active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
      flex: 0 0 auto;
    }

    .status-dot.correct { background: #5ee38b; }
    .status-dot.wrong { background: #ff7a66; }

    main {
      padding: 36px;
      display: grid;
      align-items: center;
    }

    .quiz-shell {
      width: min(920px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #f8fafc;
    }

    .progress-wrap {
      min-width: 180px;
      flex: 1 1 auto;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      background: #dfe6ee;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      transition: width 220ms ease;
    }

    .reset {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
    }

    .reset:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .quiz-body {
      padding: 34px;
    }

    .kicker {
      color: var(--blue);
      font-weight: 750;
      font-size: 0.9rem;
      margin: 0 0 12px;
    }

    .question {
      margin: 0;
      font-size: clamp(1.35rem, 2.2vw, 2rem);
      line-height: 1.32;
      letter-spacing: 0;
    }

    .options {
      margin: 30px 0 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .option {
      position: relative;
      min-height: 76px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 18px 18px 18px 54px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .option:hover {
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .option::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #9aa6b2;
      transform: translateY(-50%);
      background: #ffffff;
    }

    .option.selected {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .option.selected::before {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 5px #ffffff;
      background: var(--blue);
    }

    .option.correct {
      border-color: var(--green);
      background: #effdf3;
    }

    .option.wrong {
      border-color: var(--red);
      background: #fff1ee;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary,
    .secondary {
      min-height: 46px;
      border-radius: 8px;
      padding: 0 18px;
      cursor: pointer;
      border: 1px solid transparent;
      font-weight: 700;
    }

    .primary {
      background: var(--blue);
      color: #ffffff;
    }

    .primary:disabled {
      background: #b6c2cf;
      cursor: not-allowed;
    }

    .secondary {
      background: #ffffff;
      border-color: var(--line);
      color: var(--ink);
    }

    .secondary:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    .feedback {
      display: none;
      margin-top: 30px;
      border-left: 5px solid var(--amber);
      background: #fff8e8;
      padding: 22px;
      border-radius: 0 8px 8px 0;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      border-left-color: var(--green);
      background: #effdf3;
    }

    .feedback.wrong {
      border-left-color: var(--red);
      background: #fff1ee;
    }

    .feedback h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .feedback p {
      margin: 0 0 10px;
      color: #27313b;
      line-height: 1.62;
    }

    .feedback p:last-child {
      margin-bottom: 0;
    }

    .complete {
      display: none;
      padding: 34px;
      border-top: 1px solid var(--line);
      background: #f8fafc;
    }

    .complete.show {
      display: block;
    }

    .complete h2 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    .complete p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      .app {
        display: block;
      }

      .sidebar {
        min-height: auto;
        padding: 20px;
      }

      .question-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 0;
      }

      main {
        padding: 18px;
      }

      .quiz-body,
      .complete {
        padding: 24px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .options {
        grid-template-columns: 1fr;
      }

      .question-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .question {
        font-size: 1.28rem;
      }

      .actions {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Kvíz állapota">
      <div>
        <div class="brand">
          <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
          <div>
            <h1>Statisztika kvíz</h1>
            <p class="subtitle">Igaz-hamis gyakorlás az órai anyagból.</p>
          </div>
        </div>
      </div>

      <div class="scorebox" aria-live="polite">
        <div class="metric">
          <strong id="score">0</strong>
          <span>helyes</span>
        </div>
        <div class="metric">
          <strong id="answered">0/9</strong>
          <span>megoldva</span>
        </div>
      </div>

      <nav class="question-list" id="questionList" aria-label="Kérdések"></nav>
    </aside>

    <main>
      <section class="quiz-shell" aria-live="polite">
        <div class="topbar">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="progressLabel">1 / 9</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
          </div>
          <button class="reset" type="button" id="resetButton">Újrakezdés</button>
        </div>

        <div class="quiz-body">
          <p class="kicker" id="questionNumber"></p>
          <p class="question" id="questionText"></p>
          <div class="options" id="options"></div>
          <div class="actions">
            <button class="primary" type="button" id="submitButton" disabled>Válasz beküldése</button>
            <button class="secondary" type="button" id="nextButton">Következő</button>
          </div>
          <article class="feedback" id="feedback"></article>
        </div>

        <div class="complete" id="completeBox"></div>
      </section>
    </main>
  </div>

  <script>
    const quiz = [
      {
        number: 1,
        question: "A mintaelemek nem lesznek függetlenek egymástól, ha végtelen sokaságból akár visszatevéssel, akár visszatevés nélkül; illetve véges sokaságból visszatevéssel vesszük a mintát.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "Ez az állítás azért hamis, mert pont a felsorolt esetek többségében függetlenek lesznek a mintaelemek.",
          "A függetlenség lényege: az egyik kiválasztás eredménye nem befolyásolja a másikét.",
          "Végtelen sokaságból visszatevéssel a húzások függetlenek, mert a sokaság nem változik érdemben. Végtelen sokaságból visszatevés nélkül gyakorlatilag ugyanaz a helyzet, így a függetlenség fennmarad.",
          "Véges sokaságból visszatevéssel is függetlenek a húzások, mert minden húzás után visszakerül az elem.",
          "Nem függetlenek: véges sokaságból visszatevés nélkül, mert a kivett elem megváltoztatja a következő húzás valószínűségeit."
        ]
      },
      {
        number: 2,
        question: "A független, azonos eloszlású minta esetén a minta elemeinek eloszlása megegyezik a sokaság eloszlásával.",
        options: ["Igaz", "Hamis"],
        answer: "Igaz",
        explanation: [
          "A független, azonos eloszlású minta pontosan ezt jelenti: a mintaelemek egymástól függetlenek, és mind ugyanabból az eloszlásból származnak.",
          "Ha a sokaság eloszlása normális, akkor minden egyes mintaelem is ebből a normális eloszlásból származik. Ha a sokaság binomiális jellegű, akkor a mintaelemek is ennek megfelelő eloszlásúak lesznek.",
          "Fontos: nem azt állítjuk, hogy minden levezetett mutató eloszlása ugyanaz, hanem azt, hogy a minta egyes elemei ugyanabból az eloszlásból jönnek, mint a sokaság."
        ]
      },
      {
        number: 3,
        question: "A vizsgált ismérv szerinti homogén sokaságból veszünk rétegzett mintát.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "A rétegzett mintavétel lényege pont az, hogy a teljes sokaság nem homogén, hanem több, egymástól eltérő csoportra bontható.",
          "A jó rétegzés célja: a rétegeken belül legyen homogén a sokaság, a rétegek egymástól pedig legyenek különbözők.",
          "Tehát nem az egész sokaság homogén, hanem az egyes rétegek belül homogének.",
          "Például jövedelem vizsgálatánál a teljes népesség nem homogén, de korcsoport, régió vagy iskolai végzettség szerint homogénebb rétegekre bontható."
        ]
      },
      {
        number: 5,
        question: "A sokaság várható értékének becslésénél, normális eloszlású sokaság esetén, ha a sokaság szórása ismert, a Student-féle t-eloszlás (t) táblázatos értékével dolgozunk.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "Ha a sokaság szórása ismert, akkor a várható érték becslésénél z-eloszlást használunk, nem t-eloszlást.",
          "Szabály: ismert sokasági szórás esetén z, ismeretlen sokasági szórás, kis minta és normális sokaság esetén t.",
          "A Student-féle t-eloszlás akkor kell, amikor a sokasági szórást nem ismerjük, és a mintaszórással helyettesítjük. Ez plusz bizonytalanságot visz be."
        ]
      },
      {
        number: 6,
        question: "A sokasági szórás becslésénél a t- és/vagy a z-táblázatos értékeket alkalmazzuk.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "A sokasági szórás vagy variancia becslésénél nem t- és nem z-eloszlást, hanem khi-négyzet eloszlást használunk.",
          "A várható érték becslésénél jellemzően z vagy t szerepel, de variancia és szórás becslésénél a khi-négyzet eloszlás a megfelelő.",
          "Normális sokaság esetén a minta varianciájára vonatkozó statisztika khi-négyzet eloszlást követ, ezért erre épül a konfidenciaintervallum."
        ]
      },
      {
        number: 7,
        question: "A sokaság várható értékének becslésénél, normális eloszlású sokaság esetén, ha a sokaság szórása nem ismert és a minta kicsi, a Student-féle t-eloszlás (t) táblázatos értékével dolgozunk.",
        options: ["Igaz", "Hamis"],
        answer: "Igaz",
        explanation: [
          "Ez a klasszikus t-eloszlásos eset.",
          "A t-eloszlást akkor használjuk, ha a sokaság normális, a sokasági szórás nem ismert, és a minta kicsi.",
          "Ilyenkor a mintaszórást használjuk a sokasági szórás helyett, emiatt a normális eloszláshoz képest nagyobb bizonytalanság jelenik meg, ezt kezeli a t-eloszlás."
        ]
      },
      {
        number: 8,
        question: "A rétegzés alkalmazása növeli a standard hiba nagyságát.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "A rétegzés célja épp az, hogy csökkentse a becslési hibát, vagyis tipikusan csökkentse a standard hibát.",
          "Ha a sokaságot olyan rétegekre bontjuk, amelyek belül homogénebbek, egymástól pedig különböznek, akkor a rétegeken belüli szórás kisebb lesz.",
          "A kisebb rétegen belüli szórás pontosabb becslést eredményezhet."
        ]
      },
      {
        number: 9,
        question: "Nem arányos rétegzés esetén a standard hiba számításához a teljes szórás szükséges.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "Nem arányos rétegzésnél a standard hiba számítása nem a teljes sokaság egyetlen közös szórására épül.",
          "A számítás a rétegenkénti szórásoktól, a rétegsúlyoktól és a rétegenkénti mintanagyságoktól függ.",
          "Ha nem arányos a rétegzés, akkor egyes rétegekből szándékosan többet vagy kevesebbet veszünk, mint amit az arányos kiválasztás indokolna, ezért külön kell kezelni a rétegeket."
        ]
      },
      {
        number: 10,
        question: "Rétegzett mintavételnél a becslés pontossága csak a rétegeken belüli szóródástól függ.",
        options: ["Igaz", "Hamis"],
        answer: "Hamis",
        explanation: [
          "A csak szó miatt hamis.",
          "A pontosság valóban erősen függ a rétegeken belüli szóródástól, de nem kizárólag attól.",
          "Függ még a rétegek nagyságától, a rétegek súlyától, a rétegenkénti mintanagyságtól, attól, hogy arányos vagy nem arányos a rétegzés, és esetenként a véges sokaság korrekciójától is."
        ]
      }
    ];

    const state = {
      current: 0,
      selected: null,
      answers: Array(quiz.length).fill(null)
    };

    const els = {
      score: document.getElementById("score"),
      answered: document.getElementById("answered"),
      questionList: document.getElementById("questionList"),
      progressLabel: document.getElementById("progressLabel"),
      progressPercent: document.getElementById("progressPercent"),
      progressBar: document.getElementById("progressBar"),
      questionNumber: document.getElementById("questionNumber"),
      questionText: document.getElementById("questionText"),
      options: document.getElementById("options"),
      submit: document.getElementById("submitButton"),
      next: document.getElementById("nextButton"),
      reset: document.getElementById("resetButton"),
      feedback: document.getElementById("feedback"),
      complete: document.getElementById("completeBox")
    };

    function renderJumpList() {
      els.questionList.innerHTML = "";

      quiz.forEach((item, index) => {
        const button = document.createElement("button");
        const status = state.answers[index];
        button.className = `question-jump${index === state.current ? " active" : ""}`;
        button.type = "button";
        button.innerHTML = `<span>${item.number}. kérdés</span><span class="status-dot ${status ? (status.correct ? "correct" : "wrong") : ""}"></span>`;
        button.addEventListener("click", () => {
          state.current = index;
          state.selected = state.answers[index]?.choice || null;
          render();
        });
        els.questionList.appendChild(button);
      });
    }

    function renderQuestion() {
      const item = quiz[state.current];
      const saved = state.answers[state.current];

      els.questionNumber.textContent = `${item.number}. kérdés`;
      els.questionText.textContent = `„${item.question}”`;
      els.options.innerHTML = "";

      item.options.forEach(option => {
        const button = document.createElement("button");
        const isSelected = (saved?.choice || state.selected) === option;
        const isCorrect = saved && option === item.answer;
        const isWrong = saved && saved.choice === option && option !== item.answer;
        button.className = [
          "option",
          isSelected ? "selected" : "",
          isCorrect ? "correct" : "",
          isWrong ? "wrong" : ""
        ].filter(Boolean).join(" ");
        button.type = "button";
        button.textContent = option;
        button.disabled = Boolean(saved);
        button.addEventListener("click", () => {
          state.selected = option;
          renderQuestion();
        });
        els.options.appendChild(button);
      });

      els.submit.disabled = !state.selected || Boolean(saved);
      els.next.textContent = state.current === quiz.length - 1 ? "Befejezés" : "Következő";
      renderFeedback();
    }

    function renderFeedback() {
      const item = quiz[state.current];
      const saved = state.answers[state.current];

      if (!saved) {
        els.feedback.className = "feedback";
        els.feedback.innerHTML = "";
        return;
      }

      els.feedback.className = `feedback show ${saved.correct ? "correct" : "wrong"}`;
      const title = saved.correct
        ? `Helyes: ${item.answer}`
        : `Nem pontos. A helyes válasz: ${item.answer}`;
      els.feedback.innerHTML = [
        `<h2>${title}</h2>`,
        ...item.explanation.map(text => `<p>${text}</p>`)
      ].join("");
    }

    function renderStats() {
      const answered = state.answers.filter(Boolean).length;
      const correct = state.answers.filter(answer => answer?.correct).length;
      const percent = Math.round((answered / quiz.length) * 100);

      els.score.textContent = String(correct);
      els.answered.textContent = `${answered}/${quiz.length}`;
      els.progressLabel.textContent = `${state.current + 1} / ${quiz.length}`;
      els.progressPercent.textContent = `${percent}%`;
      els.progressBar.style.width = `${percent}%`;

      if (answered === quiz.length) {
        els.complete.className = "complete show";
        els.complete.innerHTML = `<h2>Eredmény: ${correct}/${quiz.length}</h2><p>A kvíz végére értél. Az oldalsó kérdésekre kattintva bármelyik magyarázatot újra meg tudod nézni.</p>`;
      } else {
        els.complete.className = "complete";
        els.complete.innerHTML = "";
      }
    }

    function render() {
      renderStats();
      renderJumpList();
      renderQuestion();
    }

    els.submit.addEventListener("click", () => {
      const item = quiz[state.current];
      if (!state.selected) return;

      state.answers[state.current] = {
        choice: state.selected,
        correct: state.selected === item.answer
      };
      render();
    });

    els.next.addEventListener("click", () => {
      state.current = Math.min(state.current + 1, quiz.length - 1);
      state.selected = state.answers[state.current]?.choice || null;
      render();
    });

    els.reset.addEventListener("click", () => {
      state.current = 0;
      state.selected = null;
      state.answers = Array(quiz.length).fill(null);
      render();
    });

    render();
  </script>
</body>
</html>
